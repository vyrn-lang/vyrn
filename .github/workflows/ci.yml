name: CI

on:
  push:
    branches: [main]
    # Docs-only commits (RFCs, notes, README) don't need a build.
    paths-ignore:
      - 'rfcs/**'
      - '**.md'
      - 'web/**'
      - 'editor/**'
  pull_request:
    paths-ignore:
      - 'rfcs/**'
      - '**.md'
      - 'web/**'
      - 'editor/**'

# Stacked pushes cancel the superseded run — only the newest commit's
# verdict matters on a branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Incremental artifacts bloat the cache and don't help clean CI builds.
  CARGO_INCREMENTAL: 0

jobs:
  test:
    name: tests (workspace + LSP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust cache
        # Unlike actions/cache with a lockfile key (which never re-uploads
        # after the first hit, so every run rebuilt all vyrn-* crates from a
        # stale target), rust-cache refreshes the saved target dir per run
        # and prunes stale artifacts.
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            compiler
            compiler/vyrn-lsp
      - name: Workspace tests
        working-directory: compiler
        run: cargo test --quiet
      - name: LSP tests (excluded crate)
        working-directory: compiler
        run: cargo test --quiet --manifest-path vyrn-lsp/Cargo.toml
      - name: Bench --check (deterministic, RFC-0063)
        # The BLOCKING half of bench-in-CI: `vyrn bench --check` runs each bench
        # body ONCE under the interpreter — deterministic, no clang, no timing —
        # so a bench that stops compiling/running fails the build. The corpus is
        # every example carrying `bench "` (benching, smallarray, and any future
        # one), discovered here exactly as the RFC specifies.
        working-directory: compiler
        run: |
          set -e
          corpus=$(grep -rl 'bench "' ../examples --include='*.vyrn' | sort)
          echo "bench corpus:"; echo "$corpus"
          for f in $corpus; do
            echo "== vyrn bench --check $f =="
            cargo run --quiet -p vyrn-cli -- bench "$f" --check
          done

  parity:
    name: three-way parity (interp == native == wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler
          # Separate cache from the test job — different build graph (only
          # vyrn-cli's parity test) and keeps both under the size cap.
          prefix-key: parity
      - name: wasm toolchain cache
        id: wasm-tools
        uses: actions/cache@v4
        with:
          path: ~/wasm-tools
          key: wasm-tools-wasi25-wasmtime46
      - name: Fetch wasi-sysroot + builtins + wasmtime
        if: steps.wasm-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/wasm-tools && cd ~/wasm-tools
          curl -sSfL -o sysroot.tar.gz https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/wasi-sysroot-25.0.tar.gz
          curl -sSfL -o builtins.tar.gz https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/libclang_rt.builtins-wasm32-wasi-25.0.tar.gz
          curl -sSfL -o wasmtime.tar.xz https://github.com/bytecodealliance/wasmtime/releases/download/v46.0.1/wasmtime-v46.0.1-x86_64-linux.tar.xz
          tar xf sysroot.tar.gz && tar xf builtins.tar.gz && tar xf wasmtime.tar.xz
      - name: Run the parity harness
        working-directory: compiler
        run: |
          export WASI_SYSROOT=$(echo ~/wasm-tools/wasi-sysroot-*)
          export WASI_BUILTINS=$(find ~/wasm-tools -name 'libclang_rt.builtins-wasm32.a' | head -1)
          export VYRN_WASMTIME=$(find ~/wasm-tools -type f -name wasmtime | head -1)
          echo "sysroot:  $WASI_SYSROOT"
          echo "builtins: $WASI_BUILTINS"
          echo "wasmtime: $VYRN_WASMTIME"
          cargo test --quiet -p vyrn-cli --test parity -- --ignored --nocapture

  bench:
    name: benchmarks (informational)
    # Push-to-main only: timing on shared PR runners is noise, and the trend
    # record only makes sense against the main line.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # A gross regression shows as a job-failure annotation without blocking the
    # merge — the noise on hosted runners makes a blocking timing gate a
    # false-positive machine (RFC-0063 "Out of scope").
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler
          # Separate cache slot (only vyrn-cli, and a distinct build graph).
          prefix-key: bench
      - name: Build vyrn
        working-directory: compiler
        # clang is preinstalled on ubuntu-latest (the parity job's native half
        # relies on it too); `vyrn bench` finds it on PATH.
        run: cargo build --quiet -p vyrn-cli
      - name: Run benches + compare to baseline
        working-directory: compiler
        run: |
          vyrn=target/debug/vyrn
          corpus=$(grep -rl 'bench "' ../examples --include='*.vyrn' | sort)
          mkdir -p ../bench/out
          regressed=0
          for f in $corpus; do
            stem=$(basename "$f" .vyrn)
            echo "== $stem =="
            # The trend record (always produced, uploaded below).
            "$vyrn" bench "$f" --json > "../bench/out/$stem.json"
            # The tripwire — a nonzero exit here fails the (continue-on-error) job.
            "$vyrn" bench "$f" --compare ../bench/baseline.json || regressed=1
          done
          exit $regressed
      - name: Upload bench reports (the trend record)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-json
          path: bench/out/*.json
